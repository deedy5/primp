name: CI

on:
  push:
    branches:
      - main
      - '*'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: rust
      - run: cargo fmt -- --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  linux:
    needs: [rust]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04-arm
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/primp-python/Cargo.toml
          manylinux: auto
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t --manifest-path crates/primp-python/Cargo.toml
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        working-directory: crates/primp-python
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install primp --find-links ../../dist --force-reinstall
          pip install pytest pytest-asyncio certifi
          pytest
      - name: pytest (aarch64)
        if: ${{ matrix.platform.target == 'aarch64' }}
        shell: bash
        working-directory: crates/primp-python
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install primp --find-links ../../dist --force-reinstall
          pip install pytest pytest-asyncio certifi
          pytest
      - name: pytest (emulated)
        if: ${{ !startsWith(matrix.platform.target, 'x86') && matrix.platform.target != 'aarch64' && matrix.platform.target != 'ppc64' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip
            pip3 install -U pip pytest pytest-asyncio certifi
          run: |
            set -e
            pip3 install primp --find-links dist --force-reinstall
            cd crates/primp-python && pytest

  musllinux:
    needs: [rust]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: Swatinem/rust-cache@v2
        with:
          key: musllinux-${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/primp-python/Cargo.toml
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t --manifest-path crates/primp-python/Cargo.toml
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        run: |
          docker run --rm -v ${{ github.workspace }}:/io -w /io alpine:latest sh -c "
            set -e
            apk add py3-pip py3-virtualenv
            python3 -m virtualenv .venv
            source .venv/bin/activate
            pip install primp --no-index --find-links dist --force-reinstall
            pip install pytest pytest-asyncio certifi
            cd crates/primp-python && pytest
          "
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'x86') }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: alpine_latest
          githubToken: ${{ github.token }}
          install: |
            apk add py3-virtualenv
          run: |
            set -e
            python3 -m virtualenv .venv
            source .venv/bin/activate
            pip install pytest pytest-asyncio certifi
            pip install primp --find-links dist --force-reinstall
            cd crates/primp-python && pytest

  windows:
    needs: [rust]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/primp-python/Cargo.toml
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14t
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t --manifest-path crates/primp-python/Cargo.toml
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        shell: bash
        working-directory: crates/primp-python
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          pip install primp --find-links ../../dist --force-reinstall
          pip install pytest pytest-asyncio certifi
          pytest

  macos:
    needs: [rust]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/primp-python/Cargo.toml
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t --manifest-path crates/primp-python/Cargo.toml
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        working-directory: crates/primp-python
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install primp --find-links ../../dist --force-reinstall
          pip install pytest pytest-asyncio certifi
          pytest

  sdist:
    needs: [rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: sdist
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/primp-python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v6
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  benchmark:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [linux]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          name: wheels-linux-x86_64
      - name: Install dependencies
        run: |
          pip install -r crates/primp-python/benchmark/requirements.txt
          pip install primp --no-index --find-links ./ --force-reinstall
      - name: Start granian server
        working-directory: crates/primp-python/benchmark
        run: |
          python -m granian server:app --host 0.0.0.0 --port 8000 --interface asgi &
          sleep 5
      - name: Run benchmark
        working-directory: crates/primp-python/benchmark
        run: python benchmark.py
      - name: Commit and push benchmark image
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update python benchmark image
          file_pattern: crates/primp-python/benchmark/benchmark.jpg
          branch: main
